<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyser | Unlock Your Potential</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="glass-bg"></div>
    <div class="container">
        <header>
            <h1 class="gradient-text">Resume Analyser</h1>
            <p class="subtitle">Get professional AI-driven feedback for your career journey.</p>
        </header>

        <main>
            <div class="card">
                <form id="uploadForm">
                    <div class="input-group">
                        <label for="jobType">Target Job Role</label>
                        <input type="text" id="jobType" placeholder="e.g. Software Engineer, Product Manager" required>
                    </div>

                    <div class="upload-area" id="dropZone">
                        <input type="file" id="resume" accept=".pdf" hidden>
                        <div class="upload-content">
                            <span class="upload-icon">📄</span>
                            <p id="fileNameDisplay">Drag and drop your PDF resume here or click to browse</p>
                        </div>
                    </div>

                    <button type="submit" id="analyzeBtn">Analyze Resume</button>
                </form>
            </div>

            <div id="resultCard" class="card result-card hidden">
                <h2 class="gradient-text">Analysis Report</h2>
                
                <div class="analysis-grid">
                    <div class="ats-container">
                        <div class="score-circle" id="scoreCircle">
                            <span class="score-value" id="atsScore">0</span>
                        </div>
                        <p class="subtitle">ATS Compatibility Score</p>
                    </div>

                    <section>
                        <h3 class="section-title">Professional Summary</h3>
                        <p id="summaryText" class="summary-text"></p>
                    </section>

                    <section>
                        <h3 class="section-title">Key Skills Detected</h3>
                        <div id="skillsContainer" class="skills-container"></div>
                    </section>

                    <section>
                        <h3 class="section-title">Actionable Improvements</h3>
                        <div id="improvementsList" class="improvements-list"></div>
                    </section>
                </div>

                <button onclick="resetApp()" class="secondary-btn">Analyze New Resume</button>
            </div>
        </main>

        <div id="loader" class="loader-overlay hidden">
            <div class="spinner"></div>
            <p id="loaderMessage">Analysing your profile...</p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
